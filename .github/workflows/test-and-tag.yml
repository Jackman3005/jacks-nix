name: Test and Tag

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-cli:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install CLI dependencies
      run: cd cli && bun install --frozen-lockfile

    - name: Cross-compile CLI binaries
      run: |
        cd cli
        bun run build:darwin-arm64
        bun run build:linux-x64

    - name: Upload darwin binary
      uses: actions/upload-artifact@v7
      with:
        name: cli-darwin-arm64
        path: jacks-nix-darwin-arm64

    - name: Upload linux binary
      uses: actions/upload-artifact@v7
      with:
        name: cli-linux-x64
        path: jacks-nix-linux-x64

  checks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install Nix
      uses: cachix/install-nix-action@v31.10.2
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Enable Nix flakes
      run: |
        echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf

    - name: Run tests
      run: cd bin && ./test-flake.sh

    - name: Upload test logs
      uses: actions/upload-artifact@v7
      if: always()
      with:
        name: test-logs
        path: bin/test-flake.log

  installs:
    needs: build-cli
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: cli-linux-x64
            binary: jacks-nix-linux-x64
          - os: macos-latest
            artifact: cli-darwin-arm64
            binary: jacks-nix-darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31.10.2
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Download CLI binary
        uses: actions/download-artifact@v7
        with:
          name: ${{ matrix.artifact }}

      - name: Run install via CLI binary
        run: |
          chmod +x ${{ matrix.binary }}
          ./${{ matrix.binary }} install --non-interactive
        env:
          JACKS_NIX_CONFIG_REPO_PATH: "${{ github.workspace }}"
          JACKS_NIX_USERNAME: "runner"
          JACKS_NIX_ENABLE_HOMEBREW: "false"
          NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"

      - name: Calculate closure size
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            FLAKE_OUTPUT=".#darwinConfigurations.mac-arm64.system"
            SIZE_KEY="mac_arm64"
          else
            FLAKE_OUTPUT=".#homeConfigurations.linux-x64.activationPackage"
            SIZE_KEY="linux_x64"
          fi

          echo "Building $FLAKE_OUTPUT to get store path..."
          STORE_PATH=$(nix build --no-link --print-out-paths "$FLAKE_OUTPUT")
          echo "Store path: $STORE_PATH"

          SIZE_BYTES=$(nix path-info -S "$STORE_PATH" | awk '{print $2}')
          echo "${SIZE_KEY}_bytes=${SIZE_BYTES}" > closure-size.txt
          echo "Closure size for ${SIZE_KEY}: ${SIZE_BYTES} bytes"

      - name: Upload closure size
        uses: actions/upload-artifact@v7
        with:
          name: closure-size-${{ matrix.os }}
          path: closure-size.txt
          retention-days: 1

  changelog-and-tag:
    needs:
      - checks
      - installs
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
      actions: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.JACKS_NIX_GH_PAT }}

    - name: Install Nix
      uses: cachix/install-nix-action@v31.10.2
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: Enable Nix flakes
      run: |
        echo "experimental-features = nix-command flakes" | sudo tee -a /etc/nix/nix.conf

    - name: Setup Nix cache
      uses: DeterminateSystems/magic-nix-cache-action@v13

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Configure Git
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action - Changelog"

    - name: Install nvd for package diff
      run: nix profile install nixpkgs#nvd

    - name: Download closure size artifacts
      uses: actions/download-artifact@v7
      with:
        pattern: closure-size-*
        path: size-artifacts

    - name: Set closure size environment variables
      run: |
        if [[ -f size-artifacts/closure-size-ubuntu-latest/closure-size.txt ]]; then
          source size-artifacts/closure-size-ubuntu-latest/closure-size.txt
          echo "LINUX_X64_BYTES=$linux_x64_bytes" >> $GITHUB_ENV
          echo "Linux closure size: $linux_x64_bytes bytes"
        fi
        if [[ -f size-artifacts/closure-size-macos-latest/closure-size.txt ]]; then
          source size-artifacts/closure-size-macos-latest/closure-size.txt
          echo "MAC_ARM64_BYTES=$mac_arm64_bytes" >> $GITHUB_ENV
          echo "macOS closure size: $mac_arm64_bytes bytes"
        fi

    - name: Auto-bump CLI version if source changed
      run: |
        if git diff --name-only tags/latest..HEAD -- cli/src/ 2>/dev/null | grep -q .; then
          cd cli && npm version patch --no-git-tag-version
          echo "CLI version bumped to $(jq -r .version package.json)"
        else
          echo "No CLI source changes, skipping version bump"
        fi

    - name: Generate changelog
      env:
        NIX_CONFIG: "access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}"
      run: ./bin/generate-changelog.sh

    - name: Commit changelog and tag
      run: |
        git add VERSION changelogs/ cli/package.json

        # Only commit if there are staged changes, use [skip ci] to prevent circular triggers
        if ! git diff --staged --quiet; then
          git commit -m "v$(cat VERSION): changelog [skip ci]"
          git push https://x-access-token:${{ secrets.JACKS_NIX_GH_PAT }}@github.com/${{ github.repository }}.git HEAD:main
        fi

        VERSION=$(cat VERSION)

        # Create permanent version tag (e.g., v297)
        git tag "v${VERSION}"
        git push https://x-access-token:${{ secrets.JACKS_NIX_GH_PAT }}@github.com/${{ github.repository }}.git "v${VERSION}" || true

        # Update the moving 'latest' tag
        git tag -d latest 2>/dev/null || true
        git push https://x-access-token:${{ secrets.JACKS_NIX_GH_PAT }}@github.com/${{ github.repository }}.git :refs/tags/latest || true

        git tag latest
        git push https://x-access-token:${{ secrets.JACKS_NIX_GH_PAT }}@github.com/${{ github.repository }}.git latest

    - name: Download CLI binaries
      uses: actions/download-artifact@v7
      with:
        pattern: cli-*
        merge-multiple: true

    - name: Create GitHub Release with CLI binaries
      env:
        GH_TOKEN: ${{ secrets.JACKS_NIX_GH_PAT }}
      run: |
        VERSION=$(cat VERSION)
        # Delete existing release on latest tag if present
        gh release delete latest -y 2>/dev/null || true
        # Create new release with binaries
        gh release create latest \
          --title "v${VERSION}" \
          --notes "Auto-generated release for v${VERSION}" \
          jacks-nix-darwin-arm64 \
          jacks-nix-linux-x64
